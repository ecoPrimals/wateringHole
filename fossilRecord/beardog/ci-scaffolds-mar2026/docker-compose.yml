version: '3.8'

services:
  # BearDog Core Service
  beardog:
    build: 
      context: .
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: beardog:production
    container_name: beardog-core
    restart: unless-stopped
    
    # Resource limits for production
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    
    # Environment variables
    environment:
      - RUST_LOG=info
      - BEARDOG_CONFIG_PATH=/app/configs/production.toml
      - BEARDOG_ENABLE_QUANTUM=true
      - BEARDOG_ENABLE_SIMD=true
      - BEARDOG_DATABASE_URL=postgresql://beardog:${DB_PASSWORD}@postgres:5432/beardog
      - BEARDOG_REDIS_URL=redis://redis:6379
      - BEARDOG_ENVIRONMENT=production
    
    # Port mappings
    ports:
      - "8080:8080"  # Main API
      - "9090:9090"  # Metrics/Health
    
    # Volume mounts
    volumes:
      - ./configs/production.toml:/app/configs/production.toml:ro
      - beardog-logs:/app/logs
      - beardog-data:/app/data
    
    # Dependencies
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Security
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    
    # Networks
    networks:
      - beardog-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: beardog-postgres
    restart: unless-stopped
    
    # Environment variables
    environment:
      - POSTGRES_DB=beardog
      - POSTGRES_USER=beardog
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
    
    # Volume mounts
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
    
    # Health check
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beardog -d beardog"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Security
    security_opt:
      - no-new-privileges:true
    
    # Networks
    networks:
      - beardog-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: beardog-redis
    restart: unless-stopped
    
    # Command with security settings
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    
    # Volume mounts
    volumes:
      - redis-data:/data
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.1'
    
    # Health check
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Security
    security_opt:
      - no-new-privileges:true
    
    # Networks
    networks:
      - beardog-network

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: beardog-prometheus
    restart: unless-stopped
    
    # Command
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    
    # Port mappings
    ports:
      - "9091:9090"
    
    # Volume mounts
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'
    
    # Networks
    networks:
      - beardog-network

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: beardog-grafana
    restart: unless-stopped
    
    # Environment variables
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=localhost
      - GF_SMTP_ENABLED=false
    
    # Port mappings
    ports:
      - "3000:3000"
    
    # Volume mounts
    volumes:
      - grafana-data:/var/lib/grafana
      - ./configs/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./configs/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.1'
    
    # Dependencies
    depends_on:
      - prometheus
    
    # Networks
    networks:
      - beardog-network

  # Log Management - Loki
  loki:
    image: grafana/loki:latest
    container_name: beardog-loki
    restart: unless-stopped
    
    # Command
    command: -config.file=/etc/loki/local-config.yaml
    
    # Port mappings
    ports:
      - "3100:3100"
    
    # Volume mounts
    volumes:
      - ./configs/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.1'
    
    # Networks
    networks:
      - beardog-network

# Networks
networks:
  beardog-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Volumes
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local
  beardog-logs:
    driver: local
  beardog-data:
    driver: local 