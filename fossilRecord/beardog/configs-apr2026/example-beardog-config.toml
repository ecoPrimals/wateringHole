# BearDog Example Configuration
# Generated from `cargo run --example generate_config`
# See beardog-config-template.toml for the canonical template with env var substitution.

[network.api]
bind_address = "127.0.0.1"
port = 8080
tls_enabled = false
max_connections = 100

[network.discovery]
port = 9090
backends = [
    "dns-sd",
    "static",
]
multicast_address = "239.255.0.1:9090"
interval_secs = 60

[network.admin]
bind_address = "127.0.0.1"
port = 9091
enabled = true

[paths]
config_dir = "/home/eastgate/.config/beardog"
data_dir = "/home/eastgate/.local/share/beardog"
log_dir = "/home/eastgate/.cache/beardog/logs"
pkcs11_library_paths = []

[hsm]
auto_detect = true
prefer_hardware = true
enable_softhsm = true
enable_yubihsm = false
enable_tpm = false
enable_strongbox = false
provider_order = [
    "strongbox",
    "tpm",
    "yubihsm",
    "softhsm",
]

[limits]
operation_timeout_secs = 30
connection_timeout_secs = 10
max_retries = 3
retry_delay_ms = 1000
max_concurrent_operations = 100
rate_limit_per_sec = 0
max_request_body_bytes = 10485760
cache_size = 1000
cache_ttl_secs = 300

[crypto]
rsa_key_size = 2048
ec_curve = "secp256r1"
aes_key_size = 256
hash_algorithm = "sha256"
pbkdf2_iterations = 100000
fips_mode = false

[security]
strict_mode = false
require_mtls = false
min_tls_version = "1.2"
allow_localhost_bypass = true
enable_audit_log = true
enable_rate_limiting = true
auto_block_suspicious_ips = false
require_authentication = true

[monitoring]
log_level = "info"
log_format = "text"
structured_logging = true
enable_metrics = true
metrics_port = 9092
enable_health_check = true
health_check_port = 9093
enable_performance_tracking = false
tracing_sample_rate = 0.1

