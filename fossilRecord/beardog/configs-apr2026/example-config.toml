[workflows]
enabled = true
default_approval_timeout_minutes = 60
require_dual_approval = true
max_concurrent_workflows = 100

[workflows.storage]
storage_type = "memory"

[logging]
level = "INFO"
format = "json"
file_path = "/var/log/beardog/beardog.log"

[logging.output]
console = true
file = "/var/log/beardog/beardog.log"
syslog = false

[metrics]
enabled = true
prometheus_endpoint = "/metrics"
bind_address = "0.0.0.0:9090"
collection_interval = "60s"

[metrics.prometheus]
enabled = true
endpoint = "/metrics"
port = 9090

# Demo Mode Settings
[demo]
# Enable demo mode features
enabled = false
# Generate sample data
sample_data = true
# Demo scenarios to run
scenarios = [
    "threat_detection",
    "nestgate_integration", 
    "compliance_monitoring",
    "api_endpoints"
]

# Sprint 2 Feature Flags
[features]
# Priority 1: REST API Server
api_server = true
api_authentication = true
api_rate_limiting = true
openapi_docs = true

# Priority 2: Basic Threat Detection
threat_detection = true
file_integrity_monitoring = true
rule_based_detection = true
alert_generation = true

# Priority 3: NestGate Integration
nestgate_adapter = true
zfs_key_management = true
secure_file_transfer = true
policy_enforcement = true

# Priority 4: Compliance Dashboard
compliance_monitoring = true
gdpr_compliance = true
hipaa_compliance = true
violation_tracking = true
dashboard_ui = true

# Integration Test Settings
[testing]
# Enable integration tests
enabled = false
# Test data directory
test_data_dir = "/tmp/beardog-test"
# Test API endpoints
test_api = true
# Test threat detection
test_threat_detection = true
# Test compliance monitoring
test_compliance = true

# License configuration
[licensing]
# Path to license directory for external systems
license_directory = "/etc/beardog/licenses/"
# Check license expiration every 24 hours
check_interval_hours = 24
# Contact for license renewal
license_contact = "licenses@beardog.com"
