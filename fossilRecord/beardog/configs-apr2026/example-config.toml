# BearDog Security Manager Configuration
# Sprint 2: "Core Security Foundation" - Example Configuration
# 
# This configuration demonstrates all Sprint 2 features:
# - REST API Server with Axum framework
# - Basic threat detection with file monitoring
# - NestGate integration for secure file operations
# - Compliance dashboard for GDPR/HIPAA

[security]
# Security level affects all security parameters
level = "High"
enable_hsm = false
token_expiration_seconds = 3600
max_failed_logins = 5
rate_limit_requests_per_minute = 100
max_session_duration = "8h"

[security.password_policy]
min_length = 12
require_uppercase = true
require_lowercase = true
require_numbers = true
require_special = true
history_count = 5
max_age = "90d"

[security.mfa]
required = false
methods = ["TOTP"]

[security.mfa.totp]
issuer = "BearDog Security"
time_step = 30
code_length = 6

[security.session]
timeout = "30m"
cleanup_interval = "5m"
secure_cookies = true

# Sprint 2 Priority 1: REST API Server Configuration
[api]
bind_address = "0.0.0.0:8080"
timeout = "30s"
cors_origins = ["http://localhost:3000", "https://beardog.example.com"]
rate_limit_requests_per_minute = 1000
enable_swagger = true

[api.tls]
enabled = false
cert_path = "/etc/beardog/tls/cert.pem"
key_path = "/etc/beardog/tls/key.pem"
min_version = "1.2"

[api.auth]
jwt_secret = "your-super-secret-jwt-key-here"
jwt_expiration_hours = 24
enable_rate_limiting = true

[api.auth.api_keys]
enabled = true
header_name = "X-API-Key"
key_length = 32

[api.rate_limiting]
enabled = true
requests_per_minute = 100
burst_size = 10

[api.cors]
enabled = true
allowed_origins = ["*"]
allowed_methods = ["GET", "POST"]
allowed_headers = ["*"]

[database]
url = "postgresql://beardog:password@localhost:5432/beardog"
max_connections = 100
min_connections = 5
connection_timeout_seconds = 30

[network]
host = "127.0.0.1"
port = 8443
enable_tls = false

[encryption]
default_algorithm = "aes_256_gcm"
key_derivation_iterations = 100000
key_rotation_days = 90
key_rotation_interval = "90d"
hsm_enabled = false  # Enable when HSM license is available

[encryption.hsm]
enabled = false
provider = "PKCS11"

[encryption.key_derivation.argon2]
memory_cost = 65536
time_cost = 3
parallelism = 4

[encryption.key_derivation.pbkdf2]
iterations = 100000
hash_algorithm = "SHA-256"

# Sprint 2 Priority 2: Basic Threat Detection Configuration
[threat_detection]
enabled = true
sensitivity_level = "medium"
custom_rules_path = "/etc/beardog/threat_rules/"
model_update_hours = 24

[threat_detection.ml_models]
update_interval = "24h"

[threat_detection.behavioral_analysis]
enabled = true
analysis_window = "1h"
anomaly_threshold = 0.7

# Sprint 2 Priority 4: Compliance Dashboard Configuration
[compliance]
enabled_frameworks = ["GDPR", "HIPAA", "SOX", "PCI_DSS"]
audit_retention_days = 2555  # 7 years
notification_threshold = 0.85

[audit]
enable_logging = true
retention_days = 2555  # 7 years
enable_alerts = true
log_level = "INFO"

[audit.storage]
storage_type = "file"
config = { path = "/var/log/beardog/audit.log" }

# Sprint 2 Priority 3: NestGate Integration Configuration
[adapters]
# Clear separation of free vs licensed integrations

[adapters.external_systems]
# All external systems require licenses

[adapters.external_systems.rust_ecosystem]
# Rust ecosystem projects (AGPL - always free)

[adapters.external_systems.rust_ecosystem.nestgate]
# NestGate - Your Rust secure file transfer project
enabled = true
endpoint = "https://nestgate.internal:8443"
timeout_ms = 5000

[adapters.external_systems.rust_ecosystem.nestgate.auth]
method = "JWT"
secret = "shared-internal-secret"

# ⚠️ DEPRECATED: Hardcoded primal references violate sovereignty architecture
# ✅ MIGRATION: Use capability-based discovery instead:
#   [capability_adapters.service_mesh]
#   enabled = true
#   discovery_method = "universal_adapter"
#   capability_type = "ServiceMesh"
#   timeout_ms = 3000

[adapters.external_systems.rust_ecosystem.songbird]
# DEPRECATED: SongBird - Your Rust communication platform (use capability discovery)
enabled = false  # Disabled - migrate to capability-based discovery
endpoint = "https://songbird.internal:8444"
timeout_ms = 3000

[adapters.external_systems.rust_ecosystem.songbird.auth]
method = "SharedSecret"
secret = "another-internal-secret"

# Additional Rust ecosystem projects
[adapters.external_systems.rust_ecosystem.additional_projects]

[adapters.external_systems.rust_ecosystem.additional_projects.rustguard]
enabled = true
endpoint = "https://rustguard.internal:8445"
timeout_ms = 2000

[adapters.external_systems.rust_ecosystem.additional_projects.beardb]
enabled = true
endpoint = "https://beardb.internal:8446"
timeout_ms = 10000

[adapters.external_systems.external_systems]
# Licensed external systems (non-Rust)

