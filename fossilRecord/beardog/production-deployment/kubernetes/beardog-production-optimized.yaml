apiVersion: v1
kind: Namespace
metadata:
  name: beardog-production
  labels:
    name: beardog-production
    environment: production
    sovereignty: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beardog-core
  namespace: beardog-production
  labels:
    app: beardog-core
    version: v3.0.0
    tier: production
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: beardog-core
  template:
    metadata:
      labels:
        app: beardog-core
        version: v3.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: beardog-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
      - name: beardog-core
        image: beardog/core:v3.0.0-production
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: https
          containerPort: 8443
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: BEARDOG_ENVIRONMENT
          value: "production"
        - name: BEARDOG_LOG_LEVEL
          value: "info"
        - name: BEARDOG_SERVICE_URL
          value: "http://beardog-service.beardog-production.svc.cluster.local:8080"
        - name: BEARDOG_DISCOVERY_URL
          value: "http://discovery.beardog-production.svc.cluster.local:8080/discovery"
        - name: RUST_LOG
          value: "beardog=info,tower_http=debug"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        volumeMounts:
        - name: config
          mountPath: /etc/beardog
          readOnly: true
        - name: secrets
          mountPath: /etc/secrets
          readOnly: true
        - name: temp
          mountPath: /tmp
      volumes:
      - name: config
        configMap:
          name: beardog-config
      - name: secrets
        secret:
          secretName: beardog-secrets
      - name: temp
        emptyDir:
          sizeLimit: 1Gi
      nodeSelector:
        kubernetes.io/arch: amd64
      tolerations:
      - key: "beardog.io/dedicated"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - beardog-core
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: beardog-service
  namespace: beardog-production
  labels:
    app: beardog-core
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: https
    port: 443
    targetPort: 8443
    protocol: TCP
  selector:
    app: beardog-core
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: beardog-service-account
  namespace: beardog-production
  labels:
    app: beardog-core
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: beardog-production
  name: beardog-role
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: beardog-role-binding
  namespace: beardog-production
subjects:
- kind: ServiceAccount
  name: beardog-service-account
  namespace: beardog-production
roleRef:
  kind: Role
  name: beardog-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: beardog-config
  namespace: beardog-production
data:
  config.toml: |
    [system]
    version = "3.0.0"
    environment = "production"
    instance_id = "beardog-k8s-production"
    
    [network]
    port = 8080
    host = "0.0.0.0"
    max_connections = 10000
    tls_enabled = true
    
    [security]
    encryption_enabled = true
    audit_logging = true
    hsm_integration = true
    bstp_protocol = true
    
    [performance]
    worker_threads = 8
    max_concurrent_tasks = 1000
    cache_size_mb = 512
    zero_copy_optimization = true
    
    [monitoring]
    metrics_enabled = true
    metrics_port = 9090
    health_check_interval_secs = 30
    performance_monitoring = true
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: beardog-hpa
  namespace: beardog-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: beardog-core
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: beardog-pdb
  namespace: beardog-production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: beardog-core
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: beardog-network-policy
  namespace: beardog-production
spec:
  podSelector:
    matchLabels:
      app: beardog-core
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: beardog-production
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 8443
    - protocol: TCP
      port: 9090
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: beardog-production
    ports:
    - protocol: TCP
      port: 8080
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53 