apiVersion: v1
kind: ConfigMap
metadata:
  name: beardog-prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'beardog-production'
        
    rule_files:
      - "/etc/prometheus/rules/*.yml"
      
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
              - alertmanager:9093
              
    scrape_configs:
    - job_name: 'beardog-api'
      static_configs:
        - targets: ['beardog-service.beardog-production:9090']
      scrape_interval: 5s
      metrics_path: /metrics
      relabel_configs:
        - source_labels: [__address__]
          target_label: __param_target
        - source_labels: [__param_target]
          target_label: instance
        - target_label: __address__
          replacement: beardog-service.beardog-production:9090
          
    - job_name: 'beardog-health'
      static_configs:
        - targets: ['beardog-service.beardog-production:8080']
      scrape_interval: 10s
      metrics_path: /health/metrics
      
    - job_name: 'beardog-database'
      static_configs:
        - targets: ['postgres-exporter.database:9187']
      scrape_interval: 15s
      
    - job_name: 'kubernetes-pods'
      kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
              - beardog-production
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          target_label: __address__

  beardog-alerts.yml: |
    groups:
    - name: beardog.critical
      rules:
      - alert: BearDogDown
        expr: up{job="beardog-api"} == 0
        for: 1m
        labels:
          severity: critical
          service: beardog
        annotations:
          summary: "BearDog API is down"
          description: "BearDog API has been down for more than 1 minute"
          runbook_url: "https://docs.beardog.com/runbooks/api-down"
          
      - alert: BearDogHighErrorRate
        expr: rate(beardog_http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
          service: beardog
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes"
          
      - alert: BearDogDatabaseConnectionFailure
        expr: beardog_database_connections_failed_total > 0
        for: 30s
        labels:
          severity: critical
          service: beardog
        annotations:
          summary: "Database connection failure"
          description: "BearDog cannot connect to the database"
          
    - name: beardog.warning
      rules:
      - alert: BearDogHighLatency
        expr: histogram_quantile(0.95, rate(beardog_http_request_duration_seconds_bucket[5m])) > 1.0
        for: 5m
        labels:
          severity: warning
          service: beardog
        annotations:
          summary: "High request latency"
          description: "95th percentile latency is {{ $value }}s"
          
      - alert: BearDogHighMemoryUsage
        expr: beardog_memory_usage_bytes / beardog_memory_limit_bytes > 0.85
        for: 5m
        labels:
          severity: warning
          service: beardog
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }}"
          
      - alert: BearDogHighCPUUsage
        expr: rate(beardog_cpu_usage_seconds_total[5m]) > 0.8
        for: 10m
        labels:
          severity: warning
          service: beardog
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value | humanizePercentage }}"
          
      - alert: BearDogThreatDetectionDelayed
        expr: beardog_threat_detection_queue_size > 1000
        for: 2m
        labels:
          severity: warning
          service: beardog
        annotations:
          summary: "Threat detection queue growing"
          description: "Threat detection queue has {{ $value }} items"
          
    - name: beardog.security
      rules:
      - alert: BearDogSecurityViolation
        expr: increase(beardog_security_violations_total[5m]) > 0
        for: 0s
        labels:
          severity: critical
          service: beardog
          team: security
        annotations:
          summary: "Security violation detected"
          description: "{{ $value }} security violations in the last 5 minutes"
          
      - alert: BearDogUnauthorizedAccess
        expr: increase(beardog_http_requests_total{status="401"}[1m]) > 10
        for: 1m
        labels:
          severity: warning
          service: beardog
          team: security
        annotations:
          summary: "High number of unauthorized access attempts"
          description: "{{ $value }} unauthorized access attempts in the last minute"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: beardog-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  beardog-dashboard.json: |
    {
      "dashboard": {
        "id": null,
        "title": "BearDog Production Metrics",
        "tags": ["beardog", "production"],
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Request Rate",
            "type": "graph",
            "span": 6,
            "targets": [
              {
                "expr": "sum(rate(beardog_http_requests_total[5m])) by (method, status)",
                "legendFormat": "{{method}} {{status}}",
                "refId": "A"
              }
            ],
            "yAxes": [
              {
                "label": "Requests/sec",
                "min": 0
              }
            ],
            "legend": {
              "show": true,
              "values": false,
              "min": false,
              "max": false,
              "current": false,
              "total": false,
              "avg": false
            }
          },
          {
            "id": 2,
            "title": "Response Time (95th percentile)",
            "type": "graph",
            "span": 6,
            "targets": [
              {
                "expr": "histogram_quantile(0.95, sum(rate(beardog_http_request_duration_seconds_bucket[5m])) by (le))",
                "legendFormat": "95th percentile",
                "refId": "A"
              },
              {
                "expr": "histogram_quantile(0.50, sum(rate(beardog_http_request_duration_seconds_bucket[5m])) by (le))",
                "legendFormat": "50th percentile",
                "refId": "B"
              }
            ],
            "yAxes": [
              {
                "label": "Seconds",
                "min": 0
              }
            ]
          },
          {
            "id": 3,
            "title": "Memory Usage",
            "type": "graph",
            "span": 6,
            "targets": [
              {
                "expr": "beardog_memory_usage_bytes / 1024 / 1024",
                "legendFormat": "Memory Usage (MB)",
                "refId": "A"
              },
              {
                "expr": "beardog_memory_limit_bytes / 1024 / 1024",
                "legendFormat": "Memory Limit (MB)",
                "refId": "B"
              }
            ],
            "yAxes": [
              {
                "label": "MB",
                "min": 0
              }
            ]
          },
          {
            "id": 4,
            "title": "CPU Usage",
            "type": "graph",
            "span": 6,
            "targets": [
              {
                "expr": "rate(beardog_cpu_usage_seconds_total[5m]) * 100",
                "legendFormat": "CPU Usage %",
                "refId": "A"
              }
            ],
            "yAxes": [
              {
                "label": "Percent",
                "min": 0,
                "max": 100
              }
            ]
          },
          {
            "id": 5,
            "title": "Database Connections",
            "type": "graph",
            "span": 6,
            "targets": [
              {
                "expr": "beardog_database_connections_active",
                "legendFormat": "Active Connections",
                "refId": "A"
              },
              {
                "expr": "beardog_database_connections_max",
                "legendFormat": "Max Connections",
                "refId": "B"
              }
            ],
            "yAxes": [
              {
                "label": "Connections",
                "min": 0
              }
            ]
          },
          {
            "id": 6,
            "title": "Threat Detection",
            "type": "graph",
            "span": 6,
            "targets": [
              {
                "expr": "rate(beardog_threats_detected_total[5m])",
                "legendFormat": "Threats Detected/sec",
                "refId": "A"
              },
              {
                "expr": "beardog_threat_detection_queue_size",
                "legendFormat": "Queue Size",
                "refId": "B"
              }
            ],
            "yAxes": [
              {
                "label": "Count",
                "min": 0
              }
            ]
          },
          {
            "id": 7,
            "title": "Security Events",
            "type": "graph",
            "span": 12,
            "targets": [
              {
                "expr": "increase(beardog_security_violations_total[5m])",
                "legendFormat": "Security Violations",
                "refId": "A"
              },
              {
                "expr": "increase(beardog_audit_events_total[5m])",
                "legendFormat": "Audit Events",
                "refId": "B"
              }
            ],
            "yAxes": [
              {
                "label": "Events",
                "min": 0
              }
            ]
          }
        ],
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "refresh": "5s"
      }
    }

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'alerts@beardog.com'
      smtp_auth_username: 'alerts@beardog.com'
      smtp_auth_password: 'your-app-password'
      
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'web.hook'
      routes:
      - match:
          severity: critical
        receiver: 'critical-alerts'
      - match:
          team: security
        receiver: 'security-team'
        
    receivers:
    - name: 'web.hook'
      webhook_configs:
      - url: 'http://webhook-service:5000/alerts'
        
    - name: 'critical-alerts'
      email_configs:
      - to: 'oncall@beardog.com'
        subject: 'CRITICAL: BearDog Alert'
        body: |
          Alert: {{ .GroupLabels.alertname }}
          Summary: {{ .CommonAnnotations.summary }}
          Description: {{ .CommonAnnotations.description }}
          
    - name: 'security-team'
      email_configs:
      - to: 'security@beardog.com'
        subject: 'SECURITY: BearDog Alert'
        body: |
          Security Alert: {{ .GroupLabels.alertname }}
          Summary: {{ .CommonAnnotations.summary }}
          Description: {{ .CommonAnnotations.description }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v2.40.0
        ports:
        - containerPort: 9090
        args:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus/'
          - '--web.console.libraries=/etc/prometheus/console_libraries'
          - '--web.console.templates=/etc/prometheus/consoles'
          - '--storage.tsdb.retention.time=30d'
          - '--web.enable-lifecycle'
        volumeMounts:
        - name: prometheus-config
          mountPath: /etc/prometheus/
        - name: prometheus-storage
          mountPath: /prometheus/
      volumes:
      - name: prometheus-config
        configMap:
          name: beardog-prometheus-config
      - name: prometheus-storage
        persistentVolumeClaim:
          claimName: prometheus-storage-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:9.3.0
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: grafana-secrets
              key: admin-password
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
        - name: grafana-dashboards
          mountPath: /etc/grafana/provisioning/dashboards
      volumes:
      - name: grafana-storage
        persistentVolumeClaim:
          claimName: grafana-storage-pvc
      - name: grafana-dashboards
        configMap:
          name: beardog-grafana-dashboard

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
  type: LoadBalancer

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-storage-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-storage-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi 