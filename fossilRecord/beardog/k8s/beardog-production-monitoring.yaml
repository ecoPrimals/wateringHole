---
apiVersion: v1
kind: ConfigMap
metadata:
  name: beardog-monitoring-config
  namespace: beardog-production
  labels:
    app: beardog
    component: monitoring
    version: v3.0.0
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    
    rule_files:
      - "beardog_alerts.yml"
    
    scrape_configs:
      - job_name: 'beardog-core'
        static_configs:
          - targets: ['beardog-service:8080']
        metrics_path: '/metrics'
        scrape_interval: 10s
        
      - job_name: 'beardog-security'
        static_configs:
          - targets: ['beardog-service:8081']
        metrics_path: '/security/metrics'
        scrape_interval: 5s
        
      - job_name: 'beardog-ecosystem'
        static_configs:
          - targets: ['beardog-service:8082']
        metrics_path: '/ecosystem/metrics'
        scrape_interval: 30s

  beardog_alerts.yml: |
    groups:
    - name: beardog.sovereignty
      rules:
      - alert: SovereigntyViolationDetected
        expr: beardog_sovereignty_violations_total > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "BearDog sovereignty violation detected"
          description: "Sovereignty violation count: {{ $value }}"
          
      - alert: HumanDignityConcern
        expr: beardog_human_dignity_score < 0.95
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Human dignity score below threshold"
          description: "Human dignity score: {{ $value }}"
    
    - name: beardog.security
      rules:
      - alert: SecurityThreatDetected
        expr: beardog_security_threats_total > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Security threat detected in BearDog"
          description: "Threat count: {{ $value }}"
          
      - alert: CryptographicFailure
        expr: beardog_crypto_failures_total > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Cryptographic operation failure"
          description: "Crypto failure count: {{ $value }}"
    
    - name: beardog.performance
      rules:
      - alert: HighResponseTime
        expr: beardog_response_time_ms > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "BearDog response time high"
          description: "Response time: {{ $value }}ms"
          
      - alert: MemoryUsageHigh
        expr: beardog_memory_usage_percent > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "BearDog memory usage high"
          description: "Memory usage: {{ $value }}%"
    
    - name: beardog.ecosystem
      rules:
      - alert: EcosystemDisconnection
        expr: beardog_ecosystem_connections < 1
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "BearDog ecosystem disconnected"
          description: "Active connections: {{ $value }}"
          
      - alert: CapabilityDiscoveryFailure
        expr: beardog_capability_discovery_failures_total > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Capability discovery failures"
          description: "Failure count: {{ $value }}"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beardog-prometheus
  namespace: beardog-production
  labels:
    app: beardog
    component: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beardog
      component: prometheus
  template:
    metadata:
      labels:
        app: beardog
        component: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v2.40.0
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config-volume
          mountPath: /etc/prometheus
        - name: storage-volume
          mountPath: /prometheus
        args:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus'
          - '--web.console.libraries=/etc/prometheus/console_libraries'
          - '--web.console.templates=/etc/prometheus/consoles'
          - '--storage.tsdb.retention.time=30d'
          - '--web.enable-lifecycle'
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: config-volume
        configMap:
          name: beardog-monitoring-config
      - name: storage-volume
        persistentVolumeClaim:
          claimName: prometheus-storage

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-storage
  namespace: beardog-production
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: beardog-prometheus
  namespace: beardog-production
  labels:
    app: beardog
    component: prometheus
spec:
  selector:
    app: beardog
    component: prometheus
  ports:
  - port: 9090
    targetPort: 9090
    name: prometheus

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beardog-grafana
  namespace: beardog-production
  labels:
    app: beardog
    component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beardog
      component: grafana
  template:
    metadata:
      labels:
        app: beardog
        component: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:9.3.0
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "beardog-admin-2024"
        - name: GF_INSTALL_PLUGINS
          value: "grafana-piechart-panel"
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
      volumes:
      - name: grafana-storage
        persistentVolumeClaim:
          claimName: grafana-storage

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-storage
  namespace: beardog-production
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: beardog-grafana
  namespace: beardog-production
  labels:
    app: beardog
    component: grafana
spec:
  selector:
    app: beardog
    component: grafana
  ports:
  - port: 3000
    targetPort: 3000
    name: grafana

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beardog-alertmanager
  namespace: beardog-production
  labels:
    app: beardog
    component: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beardog
      component: alertmanager
  template:
    metadata:
      labels:
        app: beardog
        component: alertmanager
    spec:
      containers:
      - name: alertmanager
        image: prom/alertmanager:v0.25.0
        ports:
        - containerPort: 9093
        volumeMounts:
        - name: alertmanager-config
          mountPath: /etc/alertmanager
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
      volumes:
      - name: alertmanager-config
        configMap:
          name: beardog-alertmanager-config

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: beardog-alertmanager-config
  namespace: beardog-production
data:
  alertmanager.yml: |
    global:
      smtp_smarthost: 'localhost:587'
      smtp_from: 'beardog-alerts@ecosystem.local'
    
    route:
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'web.hook'
      routes:
      - match:
          severity: critical
        receiver: 'critical-alerts'
      - match:
          alertname: SovereigntyViolationDetected
        receiver: 'sovereignty-alerts'
    
    receivers:
    - name: 'web.hook'
      webhook_configs:
      - url: 'http://beardog-service:8080/alerts/webhook'
        
    - name: 'critical-alerts'
      webhook_configs:
      - url: 'http://beardog-service:8080/alerts/critical'
      
    - name: 'sovereignty-alerts'
      webhook_configs:
      - url: 'http://beardog-service:8080/alerts/sovereignty'

---
apiVersion: v1
kind: Service
metadata:
  name: beardog-alertmanager
  namespace: beardog-production
  labels:
    app: beardog
    component: alertmanager
spec:
  selector:
    app: beardog
    component: alertmanager
  ports:
  - port: 9093
    targetPort: 9093
    name: alertmanager 