apiVersion: v1
kind: Namespace
metadata:
  name: beardog-production
  labels:
    name: beardog-production
    environment: production

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: beardog-config
  namespace: beardog-production
data:
  beardog-config.toml: |
    [system]
    version = "3.0.0+"
    environment = "production"
    instance_id = "beardog-prod"

    [network]
    port = 8080
    host = "0.0.0.0"
    max_connections = 10000
    tls_enabled = true
    tls_port = 8443

    [security]
    encryption_enabled = true
    audit_logging = true
    hsm_integration = true
    bstp_protocol = true

    [performance]
    worker_threads = 8
    max_concurrent_tasks = 1000
    cache_size_mb = 512
    zero_copy_optimization = true

    [monitoring]
    metrics_enabled = true
    metrics_port = 9090
    health_check_enabled = true
    tracing_enabled = true

---
apiVersion: v1
kind: Secret
metadata:
  name: beardog-secrets
  namespace: beardog-production
type: Opaque
data:
  # Base64 encoded secrets (replace with actual values)
  hsm_key: ""
  tls_cert: ""
  tls_key: ""
  jwt_secret: ""

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beardog
  namespace: beardog-production
  labels:
    app: beardog
    version: v3.0.0
    environment: production
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: beardog
  template:
    metadata:
      labels:
        app: beardog
        version: v3.0.0
        environment: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: beardog
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: beardog
        image: beardog:v3.0.0-production
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: https
          containerPort: 8443
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: RUST_LOG
          value: "info"
        - name: BEARDOG_CONFIG_PATH
          value: "/app/config/beardog-config.toml"
        - name: BEARDOG_ENVIRONMENT
          value: "production"
        - name: BEARDOG_INSTANCE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
        - name: secrets
          mountPath: /app/secrets
          readOnly: true
        - name: data
          mountPath: /app/data
        - name: logs
          mountPath: /app/logs
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
      volumes:
      - name: config
        configMap:
          name: beardog-config
      - name: secrets
        secret:
          secretName: beardog-secrets
      - name: data
        persistentVolumeClaim:
          claimName: beardog-data
      - name: logs
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: beardog-service
  namespace: beardog-production
  labels:
    app: beardog
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: https
    port: 443
    targetPort: 8443
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: beardog

---
apiVersion: v1
kind: Service
metadata:
  name: beardog-metrics
  namespace: beardog-production
  labels:
    app: beardog
    component: metrics
spec:
  type: ClusterIP
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: beardog

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: beardog
  namespace: beardog-production

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: beardog-role
  namespace: beardog-production
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: beardog-rolebinding
  namespace: beardog-production
subjects:
- kind: ServiceAccount
  name: beardog
  namespace: beardog-production
roleRef:
  kind: Role
  name: beardog-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: beardog-data
  namespace: beardog-production
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: fast-ssd

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: beardog-hpa
  namespace: beardog-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: beardog
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: beardog-network-policy
  namespace: beardog-production
spec:
  podSelector:
    matchLabels:
      app: beardog
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-system
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 8443
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring-system
    ports:
    - protocol: TCP
      port: 9090
  egress:
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80 