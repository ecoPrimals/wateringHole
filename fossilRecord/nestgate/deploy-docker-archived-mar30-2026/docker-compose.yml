version: '3.8'

services:
  # Main NestGate API Service
  nestgate-api:
    build: .
    container_name: nestgate-api
    ports:
      - "8080:8080"  # Main API
      - "8081:8081"  # Admin API
      - "8082:8082"  # Metrics
    environment:
      - RUST_LOG=info
      - NESTGATE_ENV=production
      - NESTGATE_DATABASE_URL=postgresql://nestgate:${DB_PASSWORD:-nestgate123}@postgres:5432/nestgate
      - NESTGATE_REDIS_URL=redis://redis:6379
      - NESTGATE_ZFS_ENABLED=true
    volumes:
      - ./config:/app/config:ro
      - nestgate-data:/app/data
      - nestgate-logs:/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - nestgate-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: nestgate-postgres
    environment:
      - POSTGRES_DB=nestgate
      - POSTGRES_USER=nestgate
      - POSTGRES_PASSWORD=${DB_PASSWORD:-nestgate123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - nestgate-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nestgate -d nestgate"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: nestgate-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis-data:/data
    networks:
      - nestgate-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: nestgate-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - nestgate-network
    restart: unless-stopped

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: nestgate-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - nestgate-network
    restart: unless-stopped

  # Log Aggregation - Loki
  loki:
    image: grafana/loki:latest
    container_name: nestgate-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - nestgate-network
    restart: unless-stopped

  # Reverse Proxy - Nginx
  nginx:
    image: nginx:alpine
    container_name: nestgate-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - nestgate-api
    networks:
      - nestgate-network
    restart: unless-stopped

  # Development Tools - Only for development
  nestgate-dev:
    build:
      context: .
      target: builder
    container_name: nestgate-dev
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
    working_dir: /app
    command: cargo watch -x "run --bin nestgate-api"
    environment:
      - RUST_LOG=debug
      - NESTGATE_ENV=development
    ports:
      - "8083:8080"  # Dev API port
    networks:
      - nestgate-network
    profiles:
      - dev

volumes:
  nestgate-data:
    driver: local
  nestgate-logs:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local
  cargo-cache:
    driver: local

networks:
  nestgate-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Environment-specific overrides
# Production: docker-compose -f docker-compose.yml up
# Development: docker-compose -f docker-compose.yml --profile dev up
# Testing: docker-compose -f docker-compose.yml -f docker-compose.test.yml up 