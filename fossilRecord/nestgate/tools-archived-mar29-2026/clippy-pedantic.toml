# 🎯 **PEDANTIC CLIPPY CONFIGURATION - MAXIMUM CODE QUALITY**
# 
# This configuration enables EVERY possible Clippy lint for absolute code perfection.
# No compromises, no exceptions - only the highest quality code allowed.

# === PEDANTIC LINT GROUPS ===
# Enable ALL pedantic lints
pedantic = "warn"
nursery = "warn"
cargo = "warn"

# === RESTRICTION LINTS (MAXIMUM SAFETY) ===
# These are the most restrictive lints for absolute code safety
restriction = "warn"

# === INDIVIDUAL PEDANTIC LINTS ===
# Enable every single pedantic lint explicitly

# Performance and Efficiency
unnecessary_wraps = "warn"
redundant_closure_for_method_calls = "warn"
