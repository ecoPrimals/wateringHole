# 🎯 **PEDANTIC RUSTFMT CONFIGURATION - ABSOLUTE FORMATTING PERFECTION**
#
# This configuration enforces the most pedantic formatting rules possible
# for maximum code consistency and readability across the entire codebase.

# === BASIC FORMATTING ===
edition = "2021"
hard_tabs = false
tab_spaces = 4
max_width = 100
use_small_heuristics = "Max"

# === INDENTATION AND SPACING ===
indent_style = "Block"
array_width = 60
attr_fn_like_width = 70
chain_width = 60
fn_call_width = 60
single_line_if_else_max_width = 50
struct_lit_width = 18
struct_variant_width = 35

# === IMPORTS AND USE STATEMENTS ===
imports_granularity = "Crate"
imports_layout = "Vertical"
group_imports = "StdExternalCrate"
reorder_imports = true
reorder_modules = true
merge_imports = false
use_field_init_shorthand = true
force_explicit_abi = true

# === FUNCTION AND METHOD FORMATTING ===
fn_args_layout = "Tall"
brace_style = "SameLineWhere"
control_brace_style = "AlwaysSameLine"
fn_single_line = false
where_single_line = false
force_multiline_blocks = false
fn_params_layout = "Tall"

# === STRUCT AND ENUM FORMATTING ===
struct_field_align_threshold = 0
enum_discrim_align_threshold = 0
match_arm_blocks = true
match_arm_leading_pipes = "Never"
match_block_trailing_comma = false

# === COMMENT AND DOCUMENTATION ===
comment_width = 80
wrap_comments = true
format_code_in_doc_comments = true
doc_comment_code_block_width = 100
normalize_comments = true
normalize_doc_attributes = true

# === STRING AND LITERAL FORMATTING ===
format_strings = true
format_macro_matchers = true
format_macro_bodies = true
hex_literal_case = "Preserve"

# === TRAILING ELEMENTS ===
trailing_comma = "Vertical"
trailing_semicolon = true
match_block_trailing_comma = false

# === WHITESPACE AND NEWLINES ===
blank_lines_upper_bound = 1
blank_lines_lower_bound = 0
empty_item_single_line = true
newline_style = "Unix"
remove_nested_parens = true
spaces_around_ranges = false
type_punctuation_density = "Wide"

# === ADVANCED FORMATTING OPTIONS ===
condense_wildcard_suffixes = false
force_explicit_abi = true
format_generated_files = true
skip_children = false
unstable_features = false
version = "Two"

# === PEDANTIC STYLE ENFORCEMENT ===
# These options enforce the most consistent style possible

# Control flow formatting
else_if_brace_style = "AlwaysSameLine"
empty_item_single_line = true
fn_single_line = false
where_single_line = false

# Expression formatting
overflow_delimited_expr = false
combine_control_expr = true
short_array_element_width_threshold = 10

# Import and module organization
merge_derives = true
reorder_impl_items = true

# Macro formatting
format_macro_matchers = true
format_macro_bodies = true

# Error handling
error_on_line_overflow = false
error_on_unformatted = false

# === EXPERIMENTAL FEATURES (PEDANTIC) ===
# Enable cutting-edge formatting for maximum consistency
# Note: These require nightly Rust but provide the most pedantic formatting

# Advanced import formatting
imports_granularity = "Crate"
imports_layout = "Vertical"

# Enhanced struct formatting
struct_field_align_threshold = 0

# Precise comment formatting
comment_width = 80
wrap_comments = true

# === CUSTOM THRESHOLDS FOR PEDANTIC QUALITY ===
# Set aggressive thresholds for maximum code quality
max_width = 100                    # Strict line length
tab_spaces = 4                     # Consistent indentation
array_width = 60                   # Readable array formatting
chain_width = 60                   # Method chain readability
fn_call_width = 60                 # Function call formatting
single_line_if_else_max_width = 50 # Force multi-line for complex conditions
struct_lit_width = 18              # Force vertical struct literals
struct_variant_width = 35          # Enum variant formatting 