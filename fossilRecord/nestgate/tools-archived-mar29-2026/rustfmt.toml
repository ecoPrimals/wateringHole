# struct_lit_single_line = false        # REMOVED: Not available on stable

# Array and slice formatting - stable equivalents
# array_width = 80                      # REMOVED: Not available on stable
# chain_width = 80                      # REMOVED: Not available on stable

# String formatting - stable equivalents
# format_strings = true                 # REMOVED: Not available on stable
# format_macro_matchers = true          # REMOVED: Not available on stable
# format_macro_bodies = true            # REMOVED: Not available on stable

# Comment and documentation formatting - stable equivalents
# comment_width = 80                    # REMOVED: Not available on stable
# doc_comment_code_block_width = 80     # REMOVED: Not available on stable
# normalize_comments = true             # REMOVED: Not available on stable
# normalize_doc_attributes = true       # REMOVED: Not available on stable

# Trailing elements - stable equivalents
