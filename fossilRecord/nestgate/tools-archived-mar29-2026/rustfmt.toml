# 🔥 PEDANTIC RUSTFMT CONFIGURATION - STABLE COMPATIBLE
# This configuration enforces strict formatting standards using stable features

# Edition and stability
edition = "2021"
# unstable_features = true  # REMOVED: Not available on stable

# Line length and wrapping - keep it tight
max_width = 100
hard_tabs = false
tab_spaces = 4

# Function and method formatting - stable equivalents
# fn_args_layout = "Tall"  # REMOVED: Not available on stable
# fn_single_line = false   # REMOVED: Not available on stable
# fn_call_width = 80       # REMOVED: Not available on stable
# fn_def_layout = "Tall"   # REMOVED: Not available on stable

# Control flow formatting - stable equivalents
# control_brace_style = "AlwaysSameLine"  # REMOVED: Not available on stable
# brace_style = "SameLineWhere"           # REMOVED: Not available on stable
# where_single_line = false               # REMOVED: Not available on stable

# Import formatting - stable equivalents
# imports_layout = "Vertical"           # REMOVED: Not available on stable
# imports_granularity = "Crate"         # REMOVED: Not available on stable  
# group_imports = "StdExternalCrate"    # REMOVED: Not available on stable
reorder_imports = true
# reorder_modules = true                # REMOVED: Not available on stable
# reorder_impl_items = true             # REMOVED: Not available on stable

# Struct and enum formatting - stable equivalents
# struct_field_align_threshold = 0      # REMOVED: Not available on stable
