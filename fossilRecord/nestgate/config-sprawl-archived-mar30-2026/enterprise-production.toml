# Enterprise Production Configuration for NestGate
# Optimized for high-availability, scalability, and enterprise-grade operations

[system]
instance_name = "nestgate-enterprise-prod"
environment = "production"
log_level = "info"
max_connections = 10000
worker_threads = 16
enable_metrics = true
enable_tracing = true

[network]
[network.api]
host = "0.0.0.0"
port = 8443
enable_tls = true
tls_cert_path = "/etc/nestgate/certs/server.crt"
tls_key_path = "/etc/nestgate/certs/server.key"
tls_ca_path = "/etc/nestgate/certs/ca.crt"
request_timeout_seconds = 30
max_request_size_mb = 100

[network.cluster]
enabled = true
bind_address = "0.0.0.0:8444"
cluster_name = "nestgate-enterprise"
discovery_enabled = true
discovery_multicast = "224.0.0.1:8445"
election_timeout_ms = 5000
heartbeat_interval_ms = 1000
max_missed_heartbeats = 3
encryption_enabled = true

[storage]
backend_type = "zfs_enterprise"
data_path = "/data/nestgate"
backup_path = "/backup/nestgate"
temp_path = "/tmp/nestgate"
max_file_size_gb = 100
compression_enabled = true
encryption_enabled = true
deduplication_enabled = true
snapshot_enabled = true

[storage.zfs]
pool_name = "nestgate-pool"
dataset_name = "nestgate-data"
compression = "lz4"
deduplication = true
encryption = "aes-256-gcm"
recordsize = "128k"
atime = false
sync = "standard"

[storage.performance]
cache_size_gb = 32
prefetch_enabled = true
async_io_enabled = true
zero_copy_enabled = true
buffer_pool_size_mb = 1024
io_threads = 8

[security]
[security.authentication]
enabled = true
method = "enterprise_sso"
session_timeout_minutes = 60
max_sessions_per_user = 5
password_min_length = 12
password_complexity_required = true
mfa_required = true
mfa_methods = ["totp", "webauthn", "sms"]

[security.authorization]
enabled = true
default_policy = "deny"
rbac_enabled = true
attribute_based_access = true
audit_all_access = true
privilege_escalation_detection = true

[security.encryption]
algorithm = "aes-256-gcm"
key_rotation_days = 90
key_derivation = "pbkdf2"
key_derivation_iterations = 100000
transport_encryption = "tls_1_3"
at_rest_encryption = true

[monitoring]
enabled = true
metrics_retention_days = 90
detailed_metrics = true
custom_metrics = true
alerting_enabled = true
dashboard_enabled = true

[monitoring.prometheus]
enabled = true
endpoint = "/metrics"
port = 9090
scrape_interval_seconds = 15
retention_days = 30

[monitoring.grafana]
enabled = true
port = 3000
admin_password = "${GRAFANA_ADMIN_PASSWORD}"
datasource_url = "${NESTGATE_DATASOURCE_URL:-http://localhost:9090}"
dashboard_provisioning = true

[monitoring.alerts]
email_enabled = true
slack_enabled = true
pagerduty_enabled = true
webhook_enabled = true

[monitoring.sla]
availability_target = 99.99
response_time_target_ms = 50
error_rate_target = 0.01
throughput_target_rps = 10000

[high_availability]
enabled = true
replication_factor = 3
auto_failover = true
failover_timeout_seconds = 30
health_check_interval_seconds = 10
split_brain_protection = true

[high_availability.load_balancing]
enabled = true
algorithm = "weighted_round_robin"
health_checks = true
sticky_sessions = false
connection_draining = true
drain_timeout_seconds = 300

[scalability]
auto_scaling = true
min_instances = 3
max_instances = 50
scale_up_threshold_cpu = 70
scale_up_threshold_memory = 80
scale_down_threshold_cpu = 30
scale_down_threshold_memory = 40
scale_up_cooldown_seconds = 300
scale_down_cooldown_seconds = 600

[scalability.resource_limits]
max_cpu_cores = 32
max_memory_gb = 128
max_storage_tb = 100
max_network_bandwidth_gbps = 10

[disaster_recovery]
enabled = true
backup_interval_hours = 4
backup_retention_days = 90
incremental_backups = true
cross_region_replication = true
replication_regions = ["us-west-2", "eu-west-1", "ap-northeast-1"]

[disaster_recovery.recovery_targets]
rto_minutes = 15  # Recovery Time Objective
rpo_minutes = 5   # Recovery Point Objective

[compliance]
enabled = true
standards = ["SOC2", "GDPR", "HIPAA", "ISO27001"]
audit_logging = true
audit_retention_years = 7
data_classification = true
privacy_controls = true

[compliance.audit]
log_all_access = true
log_data_changes = true
log_admin_actions = true
log_security_events = true
log_format = "json"
log_encryption = true

[compliance.data_protection]
anonymization = true
pseudonymization = true
right_to_erasure = true
data_portability = true
breach_notification = true
privacy_by_design = true

[analytics]
enabled = true
real_time_analytics = true
batch_processing = true
machine_learning = true
predictive_analytics = true
data_retention_days = 365

[analytics.data_pipeline]
stream_processing = true
batch_size = 10000
processing_interval_seconds = 60
compression = "gzip"
partitioning = "time_based"

[analytics.ml_models]
anomaly_detection = true
capacity_planning = true
performance_optimization = true
security_threat_detection = true
user_behavior_analysis = true

[observability]
distributed_tracing = true
structured_logging = true
metrics_collection = true
profiling = true
debugging = true

[observability.tracing]
service_name = "nestgate-enterprise"
sampling_rate = 0.1
jaeger_endpoint = "http://jaeger:14268/api/traces"
export_timeout_seconds = 30

[observability.logging]
format = "json"
level = "info"
output = ["stdout", "file", "syslog"]
file_path = "/var/log/nestgate/nestgate.log"
max_file_size_mb = 100
max_files = 10
compression = true

[performance]
zero_copy_io = true
async_processing = true
connection_pooling = true
request_batching = true
response_compression = true
caching_strategy = "multi_tier"

[performance.caching]
l1_cache_size_mb = 512
l2_cache_size_mb = 2048
l3_cache_size_mb = 8192
cache_ttl_seconds = 3600
cache_compression = true
cache_encryption = true

[performance.optimization]
cpu_affinity = true
numa_awareness = true
huge_pages = true
kernel_bypass = false  # Set to true if using DPDK
prefetch_distance = 64
batch_processing = true

[deployment]
container_runtime = "podman"
orchestration = "kubernetes"
service_mesh = "istio"
ingress_controller = "nginx"
cert_manager = true

[deployment.kubernetes]
namespace = "nestgate-enterprise"
replicas = 3
resource_requests_cpu = "2"
resource_requests_memory = "4Gi"
resource_limits_cpu = "8"
resource_limits_memory = "16Gi"
storage_class = "fast-ssd"
persistent_volume_size = "1Ti"

[deployment.health_checks]
liveness_probe_path = "/health/live"
readiness_probe_path = "/health/ready"
startup_probe_path = "/health/startup"
initial_delay_seconds = 30
period_seconds = 10
timeout_seconds = 5
failure_threshold = 3

[enterprise_features]
multi_tenancy = true
white_labeling = true
custom_branding = true
advanced_reporting = true
api_rate_limiting = true
custom_integrations = true

[enterprise_features.multi_tenancy]
tenant_isolation = "namespace"
resource_quotas = true
tenant_specific_configs = true
cross_tenant_access_control = true

[enterprise_features.integrations]
active_directory = true
ldap = true
saml_sso = true
oauth2 = true
api_gateway = true
service_mesh = true

[rate_limiting]
enabled = true
global_rate_limit = 100000  # requests per minute
per_user_rate_limit = 1000  # requests per minute
per_ip_rate_limit = 10000   # requests per minute
burst_allowance = 1000
rate_limit_headers = true

[backup]
enabled = true
schedule = "0 2 * * *"  # Daily at 2 AM
retention_policy = "7d,4w,12m"  # 7 daily, 4 weekly, 12 monthly
compression = "zstd"
encryption = true
verification = true
offsite_storage = true

[backup.destinations]
local = "/backup/local"
s3_bucket = "nestgate-enterprise-backups"
azure_container = "nestgate-backups"
gcs_bucket = "nestgate-enterprise-backup"

[maintenance]
maintenance_window = "02:00-04:00"
timezone = "UTC"
auto_updates = false  # Manual updates in production
update_notifications = true
health_checks_during_maintenance = true

[troubleshooting]
debug_mode = false
verbose_logging = false
performance_profiling = false
memory_profiling = false
cpu_profiling = false
network_debugging = false

# Environment-specific overrides
[production_overrides]
log_level = "warn"  # Less verbose in production
debug_mode = false
verbose_logging = false
enable_experimental_features = false
strict_mode = true 