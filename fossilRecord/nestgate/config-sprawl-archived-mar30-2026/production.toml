# NestGate v2.0 Production Configuration Template
# Copy this file to your production environment and customize as needed

[system]
# Instance identification
instance_name = "nestgate-production"
environment = "production"
log_level = "info"
data_directory = "/opt/nestgate/data"

# Service identification for ecosystem discovery
service_id = "nestgate-storage"
service_version = "2.0.0"
deployment_region = "us-east-1"  # Customize for your region

[network]
# Network binding configuration
bind_address = "0.0.0.0"
api_port = "${NESTGATE_API_PORT:-8080}"
metrics_port = 9090
health_port = 8081

# Connection management
max_connections = 1000
request_timeout_ms = "${NESTGATE_REQUEST_TIMEOUT_MS:-30000}"
keep_alive_timeout_ms = 60000
connection_pool_size = 100

# Rate limiting
enable_rate_limiting = true
requests_per_minute = 1000
burst_capacity = 100

[storage]
# Storage backend configuration
backend = "zfs"
pool_name = "nestgate-pool"
dataset_prefix = "nestgate-pool/data"

# Compression and optimization
compression = "lz4"
enable_deduplication = false
enable_snapshots = true
snapshot_retention_days = 30
snapshot_interval_hours = 6

# Storage tiers
[storage.tiers]
hot_tier_threshold_gb = 100
warm_tier_threshold_gb = 1000
cold_tier_threshold_gb = 10000

[performance]
# Thread configuration
[performance.threads]
worker_threads = 4  # Adjust based on CPU cores
max_blocking_threads = 8

# Memory configuration
[performance.memory]
max_memory = 4294967296  # 4GB - adjust based on available RAM
pool_size = 1073741824   # 1GB
cache_size = 536870912   # 512MB

# I/O configuration
[performance.io]
max_concurrent_operations = 100
buffer_size = 65536  # 64KB
read_ahead_size = 131072  # 128KB
write_batch_size = 1048576  # 1MB

# Zero-copy optimizations
enable_zero_copy = true
use_memory_mapping = true
optimize_for_throughput = true

[security]
# TLS configuration
enable_tls = true
cert_path = "/opt/nestgate/config/server.crt"
key_path = "/opt/nestgate/config/server.key"
ca_path = "/opt/nestgate/config/ca.crt"

# Authentication
require_auth = true
auth_timeout_minutes = 60
max_auth_attempts = 3
lockout_duration_minutes = 15

# Security headers
enable_security_headers = true
enable_cors = false
allowed_origins = []

# Input validation
max_request_size_mb = 100
max_upload_size_mb = 1000
enable_request_validation = true

[monitoring]
# Metrics collection
[monitoring.metrics]
enabled = true
endpoint = "/metrics"
interval = "30s"
retention_days = 30

# Health checks
[monitoring.health]
enabled = true
endpoint = "/health"
detailed_endpoint = "/health/detailed"
check_interval_seconds = 10

# Logging configuration
[monitoring.logging]
level = "info"
format = "json"
output = "file"
file_path = "/opt/nestgate/logs/nestgate.log"
max_file_size_mb = 100
max_files = 10
enable_compression = true

# Alerting
[monitoring.alerting]
enabled = true
webhook_url = "https://your-alerting-system.com/webhook"
alert_on_errors = true
alert_on_performance = true
error_threshold_per_minute = 10
response_time_threshold_ms = 1000

[ecosystem]
# Universal adapter configuration
discovery_enabled = true
discovery_timeout_ms = 30000
discovery_interval_seconds = 60

# DEPRECATED: Primal-specific preferences replaced with universal adapter capabilities
# Service preferences (optional - will auto-discover if not specified)
# preferred_security_primal = "beardog"        # Use [universal_adapter.security] instead
# preferred_orchestration_primal = "songbird"   # Use [universal_adapter.orchestration] instead
# preferred_ai_primal = "squirrel"              # Use [universal_adapter.artificial_intelligence] instead  
# preferred_compute_primal = "toadstool"        # Use [universal_adapter.compute] instead

# ✅ UNIVERSAL ADAPTER CONFIGURATION - Modern capability-based discovery
[universal_adapter]
enabled = true
discovery_method = "hybrid"  # auto, network_scan, environment, service_registry, hybrid
max_concurrent_discoveries = 10
discovery_timeout_secs = 30
capability_cache_ttl_secs = 300

[universal_adapter.security]
enabled = true
capability_type = "security"
discovery_method = "auto"
performance_requirements = { max_latency_ms = 2000, min_reliability_percent = 99.5 }
fallback_strategy = { local_fallback = true, degraded_mode_enabled = false }

[universal_adapter.artificial_intelligence]
enabled = true
capability_type = "artificial_intelligence"
discovery_method = "auto"
performance_requirements = { max_latency_ms = 30000, min_reliability_percent = 95.0 }
fallback_strategy = { local_fallback = true, degraded_mode_enabled = true }

[universal_adapter.orchestration]
enabled = true
capability_type = "orchestration"
discovery_method = "auto"
performance_requirements = { max_latency_ms = 3000, min_reliability_percent = 98.0 }
fallback_strategy = { local_fallback = true, degraded_mode_enabled = true }

[universal_adapter.compute]
enabled = true
capability_type = "compute"
discovery_method = "auto"
performance_requirements = { max_latency_ms = 10000, min_reliability_percent = 95.0 }
fallback_strategy = { local_fallback = true, degraded_mode_enabled = true }

# Fallback behavior
enable_graceful_fallbacks = true
local_operation_on_failure = true
max_retry_attempts = 3
retry_backoff_ms = 1000

# Capability requirements
required_capabilities = [
    "storage.zfs",
    "storage.snapshots", 
    "network.api",
    "monitoring.metrics"
]

optional_capabilities = [
    "security.authentication",
    "orchestration.coordination",
    "ai.optimization",
    "compute.processing"
]

[integrations]
# External service integrations
[integrations.external_services]
# Services will be discovered dynamically via universal adapter
# No hardcoded endpoints - uses capability-based discovery

# Webhook configurations
[integrations.webhooks]
enable_webhooks = false
webhook_timeout_ms = 5000
max_webhook_retries = 3

# Database integrations (if needed)
[integrations.databases]
enable_external_db = false
connection_pool_size = 10
connection_timeout_ms = 5000

[backup]
# Backup configuration
enabled = true
backup_interval_hours = 24
retention_days = 30
backup_location = "/opt/nestgate/backups"

# Snapshot-based backups
use_zfs_snapshots = true
snapshot_frequency_hours = 6
remote_backup_enabled = false

# Backup verification
verify_backups = true
verification_interval_days = 7

[maintenance]
# Maintenance windows
enable_maintenance_mode = false
maintenance_start_hour = 2  # 2 AM
maintenance_duration_hours = 2

# Automatic cleanup
enable_auto_cleanup = true
cleanup_interval_hours = 24
temp_file_retention_hours = 24
log_retention_days = 30

# Health monitoring
enable_self_healing = true
auto_restart_on_failure = true
max_restart_attempts = 3
restart_cooldown_minutes = 5

[development]
# Development and testing options (disable in production)
enable_debug_endpoints = false
enable_test_mode = false
mock_external_services = false
verbose_logging = false

# Performance profiling (enable only when needed)
enable_profiling = false
profiling_interval_seconds = 60
profiling_duration_minutes = 5

[compliance]
# Compliance and governance
enable_audit_logging = true
audit_log_path = "/opt/nestgate/logs/audit.log"
retain_audit_logs_days = 365

# Data governance
enable_data_classification = true
enable_encryption_at_rest = true
enable_encryption_in_transit = true

# Privacy protection
enable_privacy_mode = true
anonymize_logs = false
data_retention_policy_days = 2555  # 7 years

[advanced]
# Advanced configuration options
enable_experimental_features = false
custom_plugins_directory = "/opt/nestgate/plugins"
enable_custom_metrics = false

# Performance tuning
gc_interval_minutes = 30
memory_pressure_threshold = 0.8
cpu_pressure_threshold = 0.9

# Network tuning
tcp_keepalive_seconds = 60
tcp_nodelay = true
socket_reuse = true 