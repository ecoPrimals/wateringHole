# NestGate Canonical Master Configuration
# Generated by hardcoding elimination script
# Date: $(date +"%Y-%m-%d %H:%M:%S")

[api]
# API server configuration
host = "0.0.0.0"
port = 8080
timeout_seconds = 30
max_connections = 1000

[development]
# Development server configuration
port = 3000
hot_reload = true
debug_mode = false

[database]
# Database connection configuration
[database.postgresql]
host = "localhost"
port = 5432
database = "nestgate"
max_connections = 10

[database.redis]
host = "localhost"
port = 6379
database = 0
max_connections = 10

[database.mongodb]
host = "localhost"
port = 27017
database = "nestgate"
max_connections = 10

[monitoring]
# Monitoring and metrics configuration
prometheus_port = 9090
grafana_port = 3001
enable_metrics = true

[primal_discovery]
# Primal discovery service configuration
port = 5000
timeout_seconds = 5
retry_attempts = 3

[network]
# Network configuration defaults
connect_timeout_seconds = 10
read_timeout_seconds = 30
write_timeout_seconds = 30

[zfs]
# ZFS-specific configuration
pool_check_interval_seconds = 60
snapshot_retention_days = 30

[security]
# Security configuration
tls_enabled = false
cert_path = "/etc/nestgate/certs"
key_path = "/etc/nestgate/keys"

[logging]
# Logging configuration
level = "info"
format = "json"
output = "stdout"

