# NestGate NAS Service Definitions
# Example showing how the generic orchestrator handles NAS-specific workloads

services:
  # ZFS Storage Service - Heavy-duty storage management
  - name: "zfs-storage"
    service_type: "Storage"
    version: "2.0.0"
    description: "ZFS storage management with AI optimization"
    
    command:
      binary:
        path: "/usr/local/bin/nestgate-zfs"
        args: ["--config", "/etc/nestgate/zfs.yaml"]
        env_file: "/etc/nestgate/zfs.env"
    
    working_directory: "/var/lib/nestgate/zfs"
    user: "root"
    group: "zfs"
    
    # Heavy-duty resource requirements
    resources:
      cpu:
        min_cores: 2.0
        max_cores: 8.0
        cpu_affinity: [0, 1, 2, 3]  # Pin to specific cores
        priority: 10  # High priority
      memory:
        min_memory: 4294967296  # 4GB
        max_memory: 17179869184 # 16GB
        hugepages:
          size: "2Mi"
          count: 1024
      storage:
        - mount_path: "/var/lib/zfs"
          size: 107374182400  # 100GB
          storage_class: "Hot"
          access_mode: "ReadWrite"
          encryption:
            algorithm: "aes-256-gcm"
            key_source:
              environment: "ZFS_ENCRYPTION_KEY"
            encrypt_at_rest: true
      network:
        bandwidth_min: 1073741824  # 1Gbps
        bandwidth_max: 10737418240 # 10Gbps
        latency_max: "1ms"
    
    # NAS-specific networking
    networking:
      ports:
        - container_port: 8080
          host_port: 8080
          protocol: "HTTP"
          expose_externally: true
          load_balance: true
        - container_port: 2049
          host_port: 2049
          protocol: "TCP"
          expose_externally: true
          load_balance: false  # NFS shouldn't be load balanced
      load_balancing:
        algorithm: "LeastConnections"
        health_check: true
        sticky_sessions: false
      bandwidth_limits:
        ingress: 5368709120  # 5Gbps
        egress: 5368709120   # 5Gbps
    
    # Storage-specific configuration
    storage:
      backup_policy: "daily-snapshots"
      encryption:
        algorithm: "aes-256-gcm"
        key_source:
          environment: "STORAGE_ENCRYPTION_KEY"
        encrypt_at_rest: true
        encrypt_in_transit: true
    
    # Comprehensive health checks for storage
    health_check:
      startup_probe:
        http:
          endpoint: "http://localhost:8080/health/startup"
          timeout: "30s"
      liveness_probe:
        http:
          endpoint: "http://localhost:8080/health/live"
          timeout: "5s"
      readiness_probe:
        http:
          endpoint: "http://localhost:8080/health/ready"
          timeout: "10s"
      failure_threshold: 3
      success_threshold: 1
      timeout: "30s"
      interval: "15s"
      initial_delay: "30s"
    
    # No dependencies - storage is foundational
    dependencies: []
    
    # Aggressive restart policy for critical storage
    restart_policy:
      policy_type: "Always"
      max_attempts: 5
      backoff_strategy:
        initial_delay: "5s"
        max_delay: "300s"
        multiplier: 2.0
        jitter: true
      restart_window: "600s"
    
    # Storage scaling configuration
    scaling:
      min_instances: 1
      max_instances: 3
      scaling_metrics:
        - metric_type: "StorageIops"
          target_value: 10000.0
          comparison: "GreaterThan"
        - metric_type: "CpuUtilization"
          target_value: 80.0
          comparison: "GreaterThan"
    
    # Data locality for NAS
    data_locality:
      data_gravity: "PerformanceAffinity"
      replication_strategy: "SimpleStrategy"
      consistency_level: "Quorum"
    
    # NAS protocol support
    protocol_support: ["NFS", "SMB", "iSCSI", "HTTP", "HTTPS"]
    
    labels:
      tier: "storage"
      criticality: "high"
      backup: "required"
    
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
      prometheus.io/path: "/metrics"

  # NFS Protocol Gateway
  - name: "nfs-gateway"
    service_type: "ProtocolGateway"
    version: "2.0.0"
    description: "NFS protocol gateway with load balancing"
    
    command:
      binary:
        path: "/usr/local/bin/nestgate-nfs"
        args: ["--storage-backend", "zfs-storage"]
    
    resources:
      cpu:
        min_cores: 1.0
        max_cores: 4.0
      memory:
        min_memory: 1073741824  # 1GB
        max_memory: 4294967296  # 4GB
      network:
        bandwidth_min: 1073741824  # 1Gbps
        latency_max: "1ms"
    
    networking:
      ports:
        - container_port: 2049
          host_port: 2049
          protocol: "TCP"
          expose_externally: true
          load_balance: false
        - container_port: 111
          host_port: 111
          protocol: "TCP"
          expose_externally: true
          load_balance: false
    
    health_check:
      checks:
        - tcp:
            address: "localhost:2049"
            timeout: "5s"
        - command:
            command: ["showmount", "-e", "localhost"]
            expected_exit_code: 0
            timeout: "10s"
      interval: "30s"
      timeout: "10s"
    
    dependencies:
      - service_name: "zfs-storage"
        dependency_type: "HealthyBefore"
        condition: "Ready"
        timeout: "60s"
        optional: false
    
    restart_policy:
      policy_type: "OnFailure"
      max_attempts: 3
      backoff_strategy:
        initial_delay: "5s"
        max_delay: "60s"
        multiplier: 2.0
        jitter: true
    
    protocol_support: ["NFS"]
    
    labels:
      tier: "protocol"
      protocol: "nfs"
      depends_on: "zfs-storage"

  # SMB Protocol Gateway
  - name: "smb-gateway"
    service_type: "ProtocolGateway"
    version: "2.0.0"
    description: "SMB/CIFS protocol gateway"
    
    command:
      container:
        image: "nestgate/smb-gateway"
        tag: "2.0.0"
        volumes:
          - host_path: "/var/lib/nestgate/smb"
            container_path: "/etc/samba"
            read_only: false
        networks: ["nestgate-internal"]
    
    resources:
      cpu:
        min_cores: 1.0
        max_cores: 4.0
      memory:
        min_memory: 1073741824  # 1GB
        max_memory: 4294967296  # 4GB
    
    networking:
      ports:
        - container_port: 445
          host_port: 445
          protocol: "TCP"
          expose_externally: true
        - container_port: 139
          host_port: 139
          protocol: "TCP"
          expose_externally: true
    
    health_check:
      checks:
        - tcp:
            address: "localhost:445"
            timeout: "5s"
        - command:
            command: ["smbclient", "-L", "localhost", "-N"]
            expected_exit_code: 0
            timeout: "10s"
      interval: "30s"
    
    dependencies:
      - service_name: "zfs-storage"
        dependency_type: "HealthyBefore"
        condition: "Ready"
        timeout: "60s"
        optional: false
    
    protocol_support: ["SMB"]
    
    labels:
      tier: "protocol"
      protocol: "smb"

  # Web Management Interface
  # DEPRECATED: Web interface removed - using API-only architecture
  # - name: "web-interface"
  #   service_type: "WebServer"
  #   version: "2.0.0"
  #   description: "NestGate web management interface [DEPRECATED]"

# Global orchestrator configuration
orchestrator:
  name: "nestgate-nas"
  version: "2.0.0"
  
  # Heavy-duty orchestrator settings
  max_concurrent_operations: 100
  service_startup_timeout: "300s"
  service_shutdown_timeout: "60s"
  
  # Federation settings for NAS clustering
  federation:
    enabled: true
    cluster_name: "nestgate-cluster"
    discovery_method: "mdns"
    consensus_algorithm: "raft"
    
  # Monitoring integration
  monitoring:
    prometheus_enabled: true
    metrics_port: 9090
    health_check_interval: "15s"
    
  # Security settings
  security:
    tls_enabled: true
    mutual_tls: true
    rbac_enabled: true 