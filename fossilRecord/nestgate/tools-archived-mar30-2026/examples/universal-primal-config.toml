# 🌐 Universal NestGate Primal Configuration
# This configuration demonstrates how NestGate integrates with the universal primal ecosystem:
# - BearDog (Security)
# - Squirrel (AI Integration)
# - Songbird (Distribution)
# - Toadstool (Compute)

[nestgate]
# Core NestGate configuration
[nestgate.server]
host = "0.0.0.0"
port = 8080
workers = 4
max_connections = 1000
request_timeout_ms = 30000

[nestgate.storage]
zfs_enabled = true
default_pool = "nestgate-pool"
auto_snapshots = true
compression_enabled = true
deduplication_enabled = true
encryption_enabled = true

[nestgate.performance]
enable_caching = true
cache_size_mb = 512
io_threads = 8
async_queue_size = 1000

[nestgate.security]
enable_tls = true
require_authentication = true
audit_logging = true
rate_limiting = true

[primal_ecosystem]
# Universal primal ecosystem participation
enabled = true
primal_id = "nestgate"
advertised_capabilities = [
    "zfs_storage",
    "high_performance",
    "data_protection",
    "api_endpoints",
    "byob_integration",
    "ai_data_services",
    "security_integration",
    "network_storage"
]

[[primal_ecosystem.required_dependencies]]
primal_type = "security"
capabilities = ["encryption", "access_control"]
minimum_version = "1.0.0"
timeout_ms = 5000

[[primal_ecosystem.optional_dependencies]]
primal_type = "network"
capabilities = ["service_discovery", "load_balancing"]
timeout_ms = 3000

[[primal_ecosystem.optional_dependencies]]
primal_type = "ai"
capabilities = ["model_inference", "agent_framework"]
timeout_ms = 10000

[primal_ecosystem.health_check]
enabled = true
interval_seconds = 30
timeout_ms = 5000
failure_threshold = 3

[primal_ecosystem.metrics]
enabled = true
collection_interval_seconds = 15
retention_hours = 24
export_endpoint = "/metrics"

# 🐕 BearDog (Security) Integration
[primal_integrations.beardog]
enabled = true
# endpoint = "https://beardog.local:8443"  # Auto-discover if not specified
requested_capabilities = [
    "encryption",
    "access_control", 
    "audit_logging",
    "threat_detection",
    "compliance_monitoring"
]

[primal_integrations.beardog.auth]
auth_type = "mutual_tls"
token_refresh_enabled = true

[primal_integrations.beardog.auth.credentials]
cert_file = "/etc/nestgate/ssl/beardog-client.crt"
key_file = "/etc/nestgate/ssl/beardog-client.key"
ca_file = "/etc/nestgate/ssl/beardog-ca.crt"

[primal_integrations.beardog.settings]
connection_timeout_ms = 5000
request_timeout_ms = 10000
retry_attempts = 3
retry_delay_ms = 1000
connection_pool_size = 10
keep_alive_enabled = true
compression_enabled = false  # BearDog handles compression
tls_enabled = true
certificate_validation = true
mutual_tls = true

[primal_integrations.beardog.custom_config]
# BearDog-specific configuration
security_level = "enterprise"
compliance_standards = ["GDPR", "HIPAA", "SOX"]
encryption_at_rest = true
hsm_integration = true
genetic_security = true

# 🐿️ Squirrel (AI Integration) Integration
[primal_integrations.squirrel]
enabled = true
# endpoint = "http://squirrel.local:8080"  # Auto-discover if not specified
requested_capabilities = [
    "model_inference",
    "agent_framework",
    "data_processing",
    "vector_storage",
    "mcp_protocol"
]

[primal_integrations.squirrel.settings]
connection_timeout_ms = 3000
request_timeout_ms = 30000  # AI operations can take longer
retry_attempts = 2
retry_delay_ms = 2000
connection_pool_size = 5
keep_alive_enabled = true
compression_enabled = true
tls_enabled = false  # Often internal network
certificate_validation = false
mutual_tls = false

[primal_integrations.squirrel.custom_config]
# Squirrel-specific configuration
ai_models = ["gpt-4", "claude-3", "gemini-pro"]
mcp_protocol_version = "1.0"
context_window_size = 128000
batch_processing = true
streaming_enabled = true

# 🎵 Songbird (Distribution) Integration
[primal_integrations.songbird]
enabled = true
# endpoint = "http://songbird.local:8080"  # Auto-discover if not specified
requested_capabilities = [
    "service_discovery",
    "load_balancing",
    "network_routing",
    "orchestration",
    "byob_deployment"
]

[primal_integrations.songbird.settings]
connection_timeout_ms = 2000
request_timeout_ms = 5000
retry_attempts = 5
retry_delay_ms = 500
connection_pool_size = 20
keep_alive_enabled = true
compression_enabled = true
tls_enabled = false
certificate_validation = false
mutual_tls = false

[primal_integrations.songbird.custom_config]
# Songbird-specific configuration
orchestration_enabled = true
gaming_bridge_enabled = true
byob_manifests_path = "/etc/nestgate/byob"
service_mesh_integration = true
load_balancing_algorithm = "round_robin"

# 🍄 Toadstool (Compute) Integration
[primal_integrations.toadstool]
enabled = true
# endpoint = "http://toadstool.local:8080"  # Auto-discover if not specified
requested_capabilities = [
    "container_runtime",
    "serverless_execution",
    "resource_management",
    "gpu_acceleration",
    "batch_processing"
]

[primal_integrations.toadstool.settings]
connection_timeout_ms = 3000
request_timeout_ms = 15000
retry_attempts = 3
retry_delay_ms = 1000
connection_pool_size = 15
keep_alive_enabled = true
compression_enabled = true
tls_enabled = false
certificate_validation = false
mutual_tls = false

[primal_integrations.toadstool.custom_config]
# Toadstool-specific configuration
container_runtime = "containerd"
gpu_support = true
resource_limits = { cpu = "8", memory = "16Gi", storage = "100Gi" }
batch_scheduling = true

[discovery]
# Automatic primal discovery
enabled = true
methods = ["environment", "network_scan", "config", "service_registry"]
discovery_interval_seconds = 60
retry_interval_seconds = 30

[discovery.network_discovery]
interfaces = ["eth0", "wlan0", "br0"]
protocols = ["mdns", "upnp"]
scan_timeout_ms = 5000

[[discovery.network_discovery.port_ranges]]
start = 8080
end = 8090

[[discovery.network_discovery.port_ranges]]
start = 3000
end = 3010

[discovery.service_registry]
endpoint = "http://consul.local:8500"
registration_ttl_seconds = 300
refresh_interval_seconds = 120

[networking]
# Network and API configuration
[networking.api_endpoints]
rest_api_enabled = true
graphql_api_enabled = false
streaming_api_enabled = true
websocket_enabled = true
sse_enabled = true

[networking.api_endpoints.custom_endpoints]
primal_coordination = "/api/v1/primal/coordinate"
health_check = "/api/v1/health"
metrics = "/api/v1/metrics"
discovery = "/api/v1/primal/discover"

[networking.load_balancing]
enabled = true
algorithm = "round_robin"
health_check_enabled = true
session_affinity = false

[networking.tls]
enabled = true
cert_file = "/etc/nestgate/ssl/server.crt"
key_file = "/etc/nestgate/ssl/server.key"
ca_file = "/etc/nestgate/ssl/ca.crt"
verify_client = false

[networking.cors]
enabled = true
allowed_origins = ["https://nestgate.local", "https://admin.nestgate.local"]
allowed_methods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
allowed_headers = ["*"]
max_age_seconds = 3600

# 🌐 Universal Primal Coordination Examples
# These configurations show how NestGate coordinates with other primals

# Example 1: Secure Storage Request to BearDog
[examples.beardog_integration]
description = "Request encrypted storage from BearDog"
request_type = "SecureStorageRequest"
encryption_requirements = { algorithm = "AES-256-GCM", key_length = 256, at_rest = true, in_transit = true }
access_control = { rbac = true, multi_tenant = true, audit_logging = true }

# Example 2: AI Data Request to Squirrel
[examples.squirrel_integration]
description = "Request AI data processing from Squirrel"
request_type = "AiDataRequest"
data_type = "VectorStore"
performance_requirements = { min_iops = 10000, min_throughput_mbps = 1000, max_latency_ms = 100 }

# Example 3: Network Storage Request to Songbird
[examples.songbird_integration]
description = "Request distributed storage from Songbird"
request_type = "NetworkStorageRequest"
distribution_requirements = { geo_distribution = true, edge_caching = true, cdn_integration = false }
replication_config = { replicas = 3, consistency_level = "Strong", cross_region = true }

# Example 4: Compute Storage Request to Toadstool
[examples.toadstool_integration]
description = "Request compute storage from Toadstool"
request_type = "ComputeStorageRequest"
volume_requirements = { size_gb = 100, volume_type = "FileSystem", mount_options = ["rw", "sync"] }
performance_class = "Premium" 