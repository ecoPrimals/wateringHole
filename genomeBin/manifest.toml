# Genome Binary Distribution Manifest
# ===================================
#
# Source of truth for primal binary distribution across the ecoPrimals ecosystem.
# Defines all available primal binaries, versions, target architectures, and
# compliance status per the ecoBin Architecture Standard.
#
# Updated: 2026-04-19 (Phase 44 — full genomeBin cross-architecture depot)
# Version: 5.0.0 (Full Target Matrix)
#
# Layout: plasmidBin/primals/{target-triple}/{binary}
# Legacy symlinks: plasmidBin/primals/{binary} -> x86_64-unknown-linux-musl/{binary}

[manifest]
version = "5.0.0"
format = "genomeBin"
generated = "2026-04-19T00:00:00Z"
checksum_algorithm = "blake3"
deploy_script = "start_primal.sh"
build_script = "build_ecosystem_genomeBin.sh"

# =============================================================================
# TARGET MATRIX (ecoBin Architecture Standard v3.0)
# =============================================================================
#
# Tier 1 MUST:   Full static musl binaries, shipped in plasmidBin
# Tier 2 SHOULD: Full binaries where linker available, cargo check otherwise
# Tier 3 NICE:   cargo check validation (proves pure Rust, no binary shipped)

[targets]
tier1_must = [
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-musl",
    "armv7-unknown-linux-musleabihf",
]
tier2_should = [
    "x86_64-pc-windows-gnu",
    "aarch64-linux-android",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]
tier3_nice = [
    "riscv64gc-unknown-linux-musl",
    "wasm32-wasip1",
]

# macOS targets are check-only (no osxcross installed; cargo check proves pure Rust).
# WASM targets are check-only (primals use sockets/async which are not WASM-compatible).
check_only = [
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "wasm32-wasip1",
]

# =============================================================================
# PLATFORM SUPPORT
# =============================================================================

[platforms]
supported = [
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-musl",
    "armv7-unknown-linux-musleabihf",
    "x86_64-pc-windows-gnu",
    "aarch64-linux-android",
]
check_pass = [
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "riscv64gc-unknown-linux-musl",
]
fallback_order = ["native", "compatible", "wasm", "beacon"]

# =============================================================================
# BINARY FORMAT REQUIREMENTS
# =============================================================================

[binary_requirements]
pie_required = true
musl_static = true
stripped = true

# =============================================================================
