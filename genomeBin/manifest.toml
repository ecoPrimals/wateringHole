# squirrel            | FULL        | FULL         | FULL       | -       | -       | check   | check-fail
# biomeos             | FULL        | FULL         | 32bit-ovf  | -       | lib-only| check   | check-pass
# barracuda           | FULL        | FULL         | FULL       | FULL    | FULL    | check   | check-pass
# coralreef           | FULL        | FULL         | FULL       | -       | -       | check   | check-fail
# rhizocrypt          | FULL        | FULL         | FULL       | -       | FULL    | check   | check-pass
