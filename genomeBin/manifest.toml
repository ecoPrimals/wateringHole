# Genome Binary Distribution Manifest
# ===================================
#
# This manifest defines all available primal binaries, versions, and architectures
# for the ecoPrimals ecosystem. It serves as the source of truth for:
#
# 1. Local LiveSpore deployments
# 2. Remote genome fetching via api.nestgate.io
# 3. Automated update checks
#
# Updated: 2026-02-13
# Version: 2.0.0 (Universal Genome Format)
#
# EVOLUTION NOTE: All binaries are now PIE-enabled for ASLR compatibility.
# The segfault on non-PIE binaries (Feb 13, 2026) taught us to verify
# binary format before distribution.

[manifest]
version = "2.0.0"
format = "universal"
generated = "2026-02-13T20:30:00Z"
checksum_algorithm = "blake3"  # Primary: BLAKE3, Secondary: SHA256
deploy_script = "deploy.sh"

# =============================================================================
# PLATFORM SUPPORT
# =============================================================================

[platforms]
supported = [
    "x86_64-linux",
    "aarch64-linux",
]

# Future platforms (Wave 2+)
planned = [
    "x86_64-darwin",    # macOS Intel
    "aarch64-darwin",   # macOS Apple Silicon
    "x86_64-windows",   # Windows
    "aarch64-android",  # Android/Termux
    "wasm32",           # Browser fallback
]

# Deployment fallback order
fallback_order = ["native", "compatible", "wasm", "beacon"]

# =============================================================================
# BINARY FORMAT REQUIREMENTS (EVOLUTION FROM FEB 13, 2026)
# =============================================================================

[binary_requirements]
# All binaries MUST be PIE (Position Independent Executable)
# Non-PIE binaries will segfault on ASLR-enabled systems
pie_required = true

# Verification command: file ./binary | grep "pie executable"
# If NOT pie executable, do NOT distribute

# Build flags for PIE compliance:
# RUSTFLAGS="-C relocation-model=pie" cargo build --release

# =============================================================================
# PRIMALS
# =============================================================================

[primals.beardog]
name = "BearDog"
description = "Security primal - cryptography, trust, genetics, Dark Forest Gate"
latest = "0.9.0"
versions = ["0.9.0"]
architectures = ["x86_64-linux", "aarch64-linux"]
capabilities = ["crypto", "birdsong", "lineage", "hsm", "entropy", "jwt"]
ecobin_grade = "A++"
pie_verified = true

[primals.songbird]
name = "Songbird"
description = "Network primal - HTTP/TLS, federation, mesh, discovery, NAT traversal"
latest = "3.33.0"
versions = ["3.33.0", "0.2.1"]
architectures = ["x86_64-linux", "aarch64-linux"]
capabilities = ["http", "tls", "mesh", "stun", "relay", "birdsong", "discovery", "onion"]
ecobin_grade = "A++"
pie_verified = true

[primals.nestgate]
name = "NestGate"
description = "Storage primal - data persistence, provenance, compression"
latest = "2.1.0"
versions = ["2.1.0"]
architectures = ["x86_64-linux", "aarch64-linux"]
capabilities = ["storage", "provenance", "compression"]
ecobin_grade = "GOLD"
pie_verified = true  # Fixed Feb 13, 2026 - was non-PIE

[primals.squirrel]
name = "Squirrel"
description = "AI primal - model inference, MCP, local/cloud AI bridge"
latest = "0.1.0"
versions = ["0.1.0"]
architectures = ["x86_64-linux", "aarch64-linux"]
capabilities = ["ai", "inference", "mcp"]
ecobin_grade = "A++"
pie_verified = true

[primals.toadstool]
