# =============================================================================
# DEPLOYMENT TIERS
# =============================================================================

[tiers]
# Tier 1: Full NUCLEUS - All primals, full capabilities
tier1 = { name = "Full NUCLEUS", primals = ["beardog", "songbird", "nestgate", "toadstool", "squirrel", "biomeos"] }

# Tier 2: Node - Core + compute
tier2 = { name = "Node", primals = ["beardog", "songbird", "nestgate"] }

# Tier 3: Gateway - Network only
tier3 = { name = "Gateway", primals = ["beardog", "songbird"] }

# Tier 4: Beacon - Discovery only (WASM fallback)
tier4 = { name = "Beacon", primals = ["songbird"] }

# =============================================================================
# ATOMICS (Pre-configured Primal Combinations)
# =============================================================================

[atomics.tower]
name = "Tower Atomic"
description = "Security + Networking foundation (BearDog + Songbird)"
primals = ["beardog", "songbird"]
latest = "1.0.0"
versions = ["1.0.0"]
graph = "tower_atomic_bootstrap.toml"
tier = 3

[atomics.node]
name = "Node Atomic"
description = "Tower + Compute (BearDog + Songbird + Toadstool + Squirrel)"
primals = ["beardog", "songbird", "toadstool", "squirrel"]
latest = "1.0.0"
versions = ["1.0.0"]
graph = "node_atomic.toml"
tier = 2

[atomics.nest]
name = "Nest Atomic"
description = "Tower + Storage (BearDog + Songbird + NestGate)"
primals = ["beardog", "songbird", "nestgate"]
latest = "1.0.0"
versions = ["1.0.0"]
graph = "nest_atomic.toml"
tier = 2

[atomics.full]
name = "Full NUCLEUS"
description = "Complete ecosystem (All 6 components: 5 primals + orchestrator)"
primals = ["beardog", "songbird", "nestgate", "squirrel", "toadstool", "biomeos"]
latest = "1.0.0"
versions = ["1.0.0"]
graph = "nucleus_complete.toml"
tier = 1

# =============================================================================
# DISTRIBUTION ENDPOINTS
# =============================================================================

[distribution]
# Primary: Family-verified access via nestgate.io
primary_endpoint = "https://api.nestgate.io/genome"
# Fallback: Public GitHub releases
fallback_endpoint = "https://github.com/ecoPrimals/releases/download"
# Local: For LiveSpore and air-gapped deployments
local_path = "primals"
# Deploy script for universal deployment
deploy_script = "deploy.sh"

[distribution.authentication]
# Dark Forest Gate required for primary endpoint
dark_forest_required = true
# Public manifest and checksums (no auth needed)
public_paths = ["/manifest", "/checksum/*", "/deploy.sh"]
# Download requires Dark Forest Token
protected_paths = ["/{primal}/{version}/{arch}"]

# =============================================================================
# ARCHITECTURE MAPPINGS
# =============================================================================

[architectures]
# Simplified naming (removed libc suffix for universal deployment)
x86_64 = { target = "x86_64-linux", aliases = ["x64", "amd64", "x86_64-linux-gnu", "x86_64-linux-musl"] }
aarch64 = { target = "aarch64-linux", aliases = ["arm64", "aarch64-linux-gnu", "aarch64-linux-musl"] }

# Future architectures (Wave 2+)
# x86_64_darwin = { target = "x86_64-darwin", aliases = ["x64-macos", "intel-mac"] }
# aarch64_darwin = { target = "aarch64-darwin", aliases = ["arm64-macos", "apple-silicon"] }
# armv7 = { target = "arm32-linux", aliases = ["arm", "armhf", "armv7l"] }
# riscv64 = { target = "riscv64-linux", aliases = ["rv64"] }

# =============================================================================
# UPDATE POLICY
# =============================================================================

[updates]
# How often nodes should check for updates (seconds)
check_interval = 3600  # 1 hour
# Automatic update behavior
auto_update = false  # Require explicit approval
# Keep N previous versions for rollback
keep_versions = 3
# Verify PIE status before applying updates
verify_pie = true

# =============================================================================
# EVOLUTION NOTES
# =============================================================================

# Feb 13, 2026: Discovered non-PIE musl binaries segfault on ASLR systems
# - NestGate was statically linked without PIE
# - Replaced with PIE-enabled gnu builds
# - Added pie_verified flag to all primals
# - See specs/BINARY_BUILD_TARGETS_SPEC.md for details
